services:
  # Backend — Node.js / Express
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: ayd2-g13-backend
    restart: unless-stopped
    env_file:
      - ./backend/.env        
    environment:
      NODE_ENV: production
      PORT: 3001
    networks:
      - app_network

  # Frontend — React + TypeScript (Nginx)
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: ayd2-g13-frontend
    restart: unless-stopped
    ports:
      - "5173:80"
    depends_on:
      - backend  
    networks:
      - app_network 

networks:
  app_network:
    driver: bridge